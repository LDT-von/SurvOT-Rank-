name: v50_ablation_only_ot_eventsurv_blca
description: >
  P0-3a: v50 损失消融 — 仅保留 OT + EventSurv（关闭 Div/Recon/Spec/Cover/Compete）。
  对照组：验证时间局部竞争机制的贡献。

data:
  study: blca
  data_root_dir: /data/CPathPatchFeature
  data_path: survot_rank/research/legacy/slotspe_runtime/dataset_csv
  rna_format: Pathways
  label_col: survival_months_dss
  signature: combine
  n_classes: 4
  num_patches: 2048
  encoding_dim: 1024

split:
  k_start: 0
  k_end: 5

train:
  survot_method: otehv2_timelocal_competing
  specific_simple: v50_ablation_only_ot_eventsurv_blca
  results_dir: results/p0_experiments/v50_ablation_only_ot_eventsurv_blca
  max_epochs: 30
  batch_size: 4
  seed: 3
  lr: 0.0005
  opt: adamW
  reg: 0.0005
  scheduler: cosine
  eta_min: 0.000001
  gpu: 0
  num_workers: 4
  bag_loss: nll_surv
  alpha_surv: 0.0
  min_free_space_gb: 2.0

slot:
  slot_num_wsi: 8
  slot_num_omics: 8
  slot_iters: 5
  temperature: 0.01
  topk_ratio: 0.25
  top_k_method: parallel_topk_st

model:
  otehv2_eps: 0.05
  otehv2_iter: 50
  otehv2_warmup: 5
  otehv2_num_events: 24
  otehv2_heads: 4
  otehv2_layers: 4
  otehv2_dropout: 0.1
  # --- 仅保留 OT + EventSurv ---
  lambda_otehv2_ot: 0.06
  lambda_otehv2_div: 0.0
  lambda_otehv2_event_surv: 0.25
  lambda_otehv2_recon: 0.0
  # --- rankevent 黑名单：4 项全 0 ---
  lambda_rankevent_per_event: 0.0
  lambda_rankevent_rank: 0.0
  lambda_rankevent_global_cons: 0.0
  lambda_rankevent_gate_ent: 0.0
  # ---------------------------------
  rankevent_eps_start: 0.1
  rankevent_eps_end: 0.05
  rankevent_eps_anneal_epochs: 12
  rankevent_global_init: -2.0
  # --- V50 时间局部机制：关闭 ---
  lambda_timelocal_spec: 0.0
  lambda_timelocal_cover: 0.0
  lambda_compete_reg: 0.0
  compete_beta_init: -2.0
