name: v45_baseline_globalbin_blca
description: >
  P0-1 对照实验：v45 全 8 损失（rankevent 4 项保持开启）+ 当前代码的全局分箱 B +
  AdamW/wd=5e-4（与 v45_norank 完全一致的优化器设置），唯一变量是"是否关闭
  rankevent 4 项"。
  目的：v45_norank(关rankevent, 分箱B) 5-fold last5=0.6406，但历史上的
  v45(全开, 分箱A*) fold2 only=0.5026。这两者同时变了"分箱"和"损失开关"两个
  变量，无法拆分贡献。本 config 只改"分箱"（继承当前代码，已经是全局分箱），
  不改"损失开关"（保持全部 8 项 rankevent 打开，与原始 v45_blca.yaml 一致），
  与 configs/fix/v45_norank_blca.yaml 做严格对照。

data:
  study: blca
  data_root_dir: /data/CPathPatchFeature
  data_path: survot_rank/research/legacy/slotspe_runtime/dataset_csv
  rna_format: Pathways
  label_col: survival_months_dss
  signature: combine
  n_classes: 4
  num_patches: 2048
  encoding_dim: 1024

split:
  k_start: 0
  k_end: 5

train:
  survot_method: otehv2_rankevent
  specific_simple: v45_baseline_globalbin_blca
  results_dir: results/v45_baseline_globalbin_blca
  max_epochs: 30
  batch_size: 4
  seed: 3
  lr: 0.0005
  opt: adamW
  reg: 0.0005
  scheduler: cosine
  eta_min: 0.000001
  gpu: 0
  num_workers: 4
  bag_loss: nll_surv
  alpha_surv: 0.15
  min_free_space_gb: 2.0

slot:
  slot_num_wsi: 8
  slot_num_omics: 8
  slot_iters: 5
  temperature: 0.01
  topk_ratio: 0.25
  top_k_method: parallel_topk_st

model:
  otehv2_eps: 0.05
  otehv2_iter: 50
  otehv2_warmup: 5
  otehv2_num_events: 24
  otehv2_heads: 4
  otehv2_layers: 4
  otehv2_dropout: 0.1
  lambda_otehv2_ot: 0.06
  lambda_otehv2_div: 0.01
  lambda_otehv2_event_surv: 0.25
  lambda_otehv2_recon: 0.2
  # --- rankevent 4 项保持开启（与 v45_norank 唯一的区别）---
  lambda_rankevent_per_event: 0.15
  lambda_rankevent_rank: 0.15
  lambda_rankevent_global_cons: 0.02
  lambda_rankevent_gate_ent: 0.005
  # ------------------------------------------------------
  rankevent_eps_start: 0.1
  rankevent_eps_end: 0.05
  rankevent_eps_anneal_epochs: 12
  rankevent_global_init: -2.0
