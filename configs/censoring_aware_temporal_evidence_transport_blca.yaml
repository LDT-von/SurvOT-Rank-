name: censoring_aware_temporal_evidence_transport_blca
description: Censoring-aware temporal evidence transport for BLCA DSS.

data:
  study: blca
  data_root_dir: /data/CPathPatchFeature
  data_path: survot_rank/research/legacy/slotspe_runtime/dataset_csv
  rna_format: Pathways
  label_col: survival_months_dss
  signature: combine
  n_classes: 4
  num_patches: 2048
  encoding_dim: 1024

split:
  k_start: 0
  k_end: 5

train:
  survot_method: censoring_aware_temporal_evidence_transport
  specific_simple: censoring_aware_temporal_evidence_transport_blca
  results_dir: results/censoring_aware_temporal_evidence_transport_blca
  max_epochs: 50           # 30ep 下 fold2 峰值仍在末段，延长到 50 确保收敛
  batch_size: 16           # 调大物理 batch：单次 forward 有16样本，排序/risk-set 损失才有足够可比对（梯度累积替代不了这点）
  grad_accum_steps: 2      # 有效 batch = 16*2 = 32
  warmup_epochs: 5         # 前 5 epoch 线性 warmup
  grad_clip_norm: 1.0      # 梯度裁剪，进一步稳定小 batch 训练
  seed: 3
  lr: 0.0005
  opt: adamW
  reg: 0.0005              # 真正生效的 weight decay（原 1e-5 ≈ 无正则）
  scheduler: cosine
  gpu: 0
  num_workers: 4
  bag_loss: nll_surv
  alpha_surv: 0.15
  min_free_space_gb: 2.0

slot:
  slot_num_wsi: 8
  slot_num_omics: 8
  slot_iters: 3
  temperature: 0.01
  topk_ratio: 0.25
  top_k_method: parallel_topk_st

model:
  otehv2_eps: 0.05
  otehv2_iter: 50
  otehv2_heads: 4
  otehv2_layers: 2
  otehv2_dropout: 0.1
  catet_num_stages: 4
  catet_prog_cost: 0.20
  catet_lambda_ot: 0.04
  catet_lambda_rank: 0.08
  catet_lambda_intervention: 0.05
  catet_keep_ratio: 0.25
  catet_intervention_margin: 0.05
  catet_rank_margin: 0.0
  catet_rank_max_pairs: 4096
  rg_eps_start: 0.10
  rg_eps_anneal: 12
