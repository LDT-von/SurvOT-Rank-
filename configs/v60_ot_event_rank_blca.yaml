name: v60_ot_event_rank_blca
description: V60 OT Event Rank — stable log-domain OT-event backbone with compact event ranking.

data:
  study: blca
  data_root_dir: /data/CPathPatchFeature
  data_path: survot_rank/research/legacy/slotspe_runtime/dataset_csv
  rna_format: Pathways
  label_col: survival_months_dss
  signature: combine
  n_classes: 4
  num_patches: 2048
  encoding_dim: 1024

split:
  k_start: 0
  k_end: 5

train:
  survot_method: v60_ot_event_rank
  specific_simple: v60_ot_event_rank_blca
  results_dir: results/v60_ot_event_rank
  max_epochs: 30
  batch_size: 4
  lr: 0.0005
  opt: adam
  scheduler: cosine
  eta_min: 0.000001
  gpu: 0
  num_workers: 4
  bag_loss: nll_surv
  alpha_surv: 1.0

slot:
  slot_num_wsi: 8
  slot_num_omics: 8
  slot_iters: 5
  temperature: 0.01
  topk_ratio: 0.25
  top_k_method: parallel_topk_st

model:
  otehv2_eps: 0.05
  otehv2_iter: 40
  otehv2_warmup: 8
  otehv2_num_events: 24
  otehv2_heads: 4
  otehv2_layers: 4
  otehv2_dropout: 0.1
  lambda_otehv2_ot: 0.06
  lambda_otehv2_div: 0.005
  lambda_otehv2_event_surv: 0.0
  lambda_otehv2_recon: 0.0
  v60_num_events: 24
  v60_lambda_per_event: 0.15
  v60_lambda_rank: 0.15
  v60_rank_margin: 0.0
  v60_rank_max_pairs: 4096
