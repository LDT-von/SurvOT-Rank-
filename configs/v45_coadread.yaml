name: v45_blca
description: 'Default V45 otehv2_rankevent BLCA 5-fold training config. alpha_surv=0.15（历史网格搜索
  v45_best_blca 验证过的值，2026-07-06 fold-3 smoke search 发现 alpha=1.0 让 NLL loss 完全丢弃删失病人的贡献，
  在事件时间长尾/高方差的 fold 上训练不稳定，导致折间 std 明显偏大； alpha=0.15 时 std 减半，是当前已验证的最优单点，不是原始默认 0.0）。

  '
data:
  study: coadread
  data_root_dir: /data/CPathPatchFeature
  data_path: survot_rank/research/legacy/slotspe_runtime/dataset_csv
  rna_format: Pathways
  label_col: survival_months_dss
  signature: combine
  n_classes: 4
  num_patches: 2048
  encoding_dim: 1024
split:
  k_start: 0
  k_end: 5
train:
  survot_method: otehv2_rankevent
  specific_simple: runall_otehv2_rankevent_30ep
  results_dir: results/v45_coadread
  max_epochs: 30
  batch_size: 4
  seed: 3
  lr: 0.0005
  gpu: 0
  num_workers: 4
  bag_loss: nll_surv
  alpha_surv: 0.15
  min_free_space_gb: 2.0
slot:
  slot_num_wsi: 8
  slot_num_omics: 8
  slot_iters: 5
  temperature: 0.01
  topk_ratio: 0.25
  top_k_method: parallel_topk_st
model:
  otehv2_eps: 0.05
  otehv2_iter: 50
  otehv2_warmup: 5
  otehv2_num_events: 24
  otehv2_heads: 4
  otehv2_layers: 4
  otehv2_dropout: 0.1
  lambda_otehv2_ot: 0.06
  lambda_otehv2_div: 0.01
  lambda_otehv2_event_surv: 0.25
  lambda_otehv2_recon: 0.2
  lambda_rankevent_per_event: 0.15
  lambda_rankevent_rank: 0.15
  lambda_rankevent_global_cons: 0.02
  lambda_rankevent_gate_ent: 0.005
  rankevent_eps_start: 0.1
  rankevent_eps_end: 0.05
  rankevent_eps_anneal_epochs: 12
  rankevent_global_init: -2.0
