name: v50_blca
description: >
  V50 otehv2_timelocal_competing（时间局部竞争事件危险率分解）BLCA 5-fold 训练配置。
  合并自独立文件夹 50_otehv2_timelocal_competing/，现接入主项目 METHOD_REGISTRY
  统一管理（方法名 otehv2_timelocal_competing，别名 50）。
  超参数与 configs/v45_blca.yaml 的骨架部分（otehv2_*/rankevent_*）保持一致，
  额外新增 V50 专属超参数（timelocal_spec/cover、compete_reg、beta_init）。

data:
  study: blca
  data_root_dir: /data/CPathPatchFeature
  data_path: survot_rank/research/legacy/slotspe_runtime/dataset_csv
  rna_format: Pathways
  label_col: survival_months_dss
  signature: combine
  n_classes: 4
  num_patches: 2048
  encoding_dim: 1024

split:
  k_start: 0
  k_end: 5

train:
  survot_method: otehv2_timelocal_competing
  specific_simple: runall_otehv2_timelocal_competing_30ep
  results_dir: results/v50_blca
  max_epochs: 30
  batch_size: 4
  seed: 3
  lr: 0.0005
  gpu: 0
  num_workers: 4
  bag_loss: nll_surv
  alpha_surv: 0.0
  min_free_space_gb: 2.0

slot:
  slot_num_wsi: 8
  slot_num_omics: 8
  slot_iters: 5
  temperature: 0.01
  topk_ratio: 0.25
  top_k_method: parallel_topk_st

model:
  otehv2_eps: 0.05
  otehv2_iter: 50
  otehv2_warmup: 5
  otehv2_num_events: 24
  otehv2_heads: 4
  otehv2_layers: 4
  otehv2_dropout: 0.1
  lambda_otehv2_ot: 0.06
  lambda_otehv2_div: 0.01
  lambda_otehv2_event_surv: 0.25
  lambda_otehv2_recon: 0.2
  lambda_rankevent_per_event: 0.15
  lambda_rankevent_rank: 0.15
  lambda_rankevent_global_cons: 0.02
  lambda_rankevent_gate_ent: 0.005
  rankevent_eps_start: 0.1
  rankevent_eps_end: 0.05
  rankevent_eps_anneal_epochs: 12
  rankevent_global_init: -2.0
  lambda_timelocal_spec: 0.01
  lambda_timelocal_cover: 0.01
  lambda_compete_reg: 0.001
  compete_beta_init: -2.0
