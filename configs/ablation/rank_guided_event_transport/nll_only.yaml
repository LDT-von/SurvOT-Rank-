name: rg_et_ablation_nll_only
description: Survival NLL only; no OT, prognostic cost, rank, or stage loss.
data:
  study: blca
  data_root_dir: /data/CPathPatchFeature
  data_path: survot_rank/research/legacy/slotspe_runtime/dataset_csv
  rna_format: Pathways
  label_col: survival_months_dss
  signature: combine
  n_classes: 4
  num_patches: 2048
  encoding_dim: 1024
split:
  k_start: 2
  k_end: 3
train:
  survot_method: rank_guided_event_transport
  specific_simple: rg_et_ablation_nll_only
  results_dir: results/rg_et_ablation/nll_only
  max_epochs: 30
  batch_size: 4
  seed: 3
  lr: 0.0005
  gpu: '0'
  num_workers: 4
  bag_loss: nll_surv
  alpha_surv: 0.15
  min_free_space_gb: 2.0
slot:
  slot_num_wsi: 8
  slot_num_omics: 8
  slot_iters: 5
  temperature: 0.01
  topk_ratio: 0.25
  top_k_method: parallel_topk_st
model:
  otehv2_eps: 0.05
  otehv2_iter: 50
  otehv2_heads: 4
  otehv2_layers: 4
  otehv2_dropout: 0.1
  rg_num_events: 4
  rg_prog_cost: 0.0
  rg_lambda_ot: 0.0
  rg_lambda_rank: 0.0
  rg_lambda_stage: 0.0
  rg_rank_margin: 0.0
  rg_rank_max_pairs: 4096
  rg_stage_margin: 0.25
  rg_eps_start: 0.1
  rg_eps_anneal: 12
