name: faithful_evidence_transport_blca
description: Faithful stage-wise pathology-pathway evidence transport on BLCA DSS.

data:
  study: blca
  data_root_dir: /data/CPathPatchFeature
  data_path: survot_rank/research/legacy/slotspe_runtime/dataset_csv
  rna_format: Pathways
  label_col: survival_months_dss
  signature: combine
  n_classes: 4
  num_patches: 2048
  encoding_dim: 1024

split:
  k_start: 0
  k_end: 5

train:
  survot_method: faithful_evidence_transport
  specific_simple: faithful_evidence_transport_blca
  results_dir: results/faithful_evidence_transport_blca
  max_epochs: 30
  batch_size: 4
  grad_accum_steps: 8      # 有效 batch = 4*8 = 32，稳住 NLL 梯度、消除早峰（核心修复）
  warmup_epochs: 3         # 前 3 epoch 线性 warmup，避免 cosine 峰值 lr 在 ep0 乱跳
  grad_clip_norm: 1.0      # 梯度裁剪，进一步稳定小 batch 训练
  seed: 3
  lr: 0.0005
  opt: adamW               # 原缺省会退化为 Adam，导致 reg(weight decay) 不生效
  reg: 0.0005              # 真正生效的 weight decay
  scheduler: cosine
  gpu: 0
  num_workers: 4
  bag_loss: nll_surv
  alpha_surv: 0.15
  min_free_space_gb: 2.0

slot:
  slot_num_wsi: 8
  slot_num_omics: 8
  slot_iters: 5
  temperature: 0.01
  topk_ratio: 0.25
  top_k_method: parallel_topk_st

model:
  otehv2_eps: 0.05
  otehv2_iter: 50
  otehv2_heads: 4
  otehv2_layers: 2
  otehv2_dropout: 0.1
  fet_num_stages: 4
  spt_prog_cost: 0.20
  spt_lambda_ot: 0.06
  spt_lambda_rank: 0.05
  spt_lambda_stage: 0.02
  spt_stage_margin: 0.25
  fet_lambda_sparse: 0.01
  fet_lambda_faith: 0.05
  fet_keep_ratio: 0.25
  fet_faith_margin: 0.05
  rg_eps_start: 0.10
  rg_eps_anneal: 12
